<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',serif;background:#2D0D18;color:#1A0A0F;min-height:100vh;}
header{background:linear-gradient(135deg,#2D0D18,#4A1628,#6B2040);padding:16px 20px;text-align:center;border-bottom:2px solid #C9A84C;}
header h1{font-family:'Playfair Display',serif;font-size:24px;color:#E8C97A;letter-spacing:1px;}
header p{color:rgba(232,201,122,0.7);font-size:13px;margin-top:3px;font-style:italic;}
.tabs{display:flex;background:#4A1628;border-bottom:2px solid #C9A84C;overflow-x:auto;}
.tab{flex:1;min-width:60px;padding:10px 4px;text-align:center;cursor:pointer;font-size:11px;color:rgba(232,201,122,0.6);border:none;background:none;border-bottom:3px solid transparent;line-height:1.3;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
.tab.ativo{color:#E8C97A;border-bottom:3px solid #C9A84C;background:rgba(201,168,76,0.1);}
.content{background:#F5F0E8;min-height:calc(100vh - 130px);padding:16px 14px 80px;}
.panel{display:none;}
.panel.ativo{display:block;}
.card{background:white;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(74,22,40,0.1);border-left:4px solid #C9A84C;}
.titulo{font-family:'Playfair Display',serif;font-size:17px;color:#4A1628;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.titulo::after{content:"";flex:1;height:1px;background:linear-gradient(to right,#C9A84C,transparent);}
label{display:block;font-size:11px;font-weight:500;color:#4A1628;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;margin-top:12px;}
label:first-child{margin-top:0;}
input,select,textarea{width:100%;border:1.5px solid #DDD;border-radius:7px;padding:9px 11px;font-family:'Crimson Pro',serif;font-size:15px;color:#1A0A0F;background:#F5F0E8;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#C9A84C;background:white;}
textarea{resize:vertical;min-height:75px;}
.btn{display:block;width:100%;padding:12px;background:linear-gradient(135deg,#4A1628,#6B2040);color:#E8C97A;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin-top:14px;box-shadow:0 3px 10px rgba(74,22,40,0.3);}
.btn-sec{background:white;color:#4A1628;border:1.5px solid #4A1628;box-shadow:none;font-size:13px;padding:8px;margin-top:8px;font-family:'Crimson Pro',serif;}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;}
.tag{background:#EAE2D0;border:1px solid #CCC;border-radius:20px;padding:4px 11px;font-size:13px;cursor:pointer;color:#1A0A0F;-webkit-tap-highlight-color:transparent;}
.tag.on{background:#4A1628;color:#E8C97A;border-color:#4A1628;}
.badge{display:inline-block;color:white;border-radius:4px;padding:1px 6px;font-size:11px;margin-right:3px;}
.tag-mini{background:#EAE2D0;border-radius:10px;padding:2px 8px;font-size:11px;color:#4A1628;}
.btn-del{float:right;background:none;border:none;color:#CCC;cursor:pointer;font-size:18px;padding:0;}
.busca-wrap{position:relative;margin-bottom:12px;}
.busca-wrap input{padding-left:36px;}
.busca-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#7A6E6E;font-size:15px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat{background:white;border-radius:10px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(74,22,40,0.08);border-top:3px solid #C9A84C;}
.stat-n{font-family:'Playfair Display',serif;font-size:30px;color:#4A1628;font-weight:700;line-height:1;}
.stat-l{font-size:10px;color:#7A6E6E;text-transform:uppercase;letter-spacing:0.6px;margin-top:3px;}
.card-mini{background:white;border-radius:8px;padding:12px;margin-bottom:9px;box-shadow:0 1px 6px rgba(74,22,40,0.08);border-left:3px solid #C9A84C;}
.ev-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:white;border-radius:7px;margin-bottom:6px;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border-left:3px solid #C9A84C;}
.ev-st{font-size:11px;color:#7A6E6E;}
.row{display:flex;gap:8px;margin-top:8px;}
.row input{font-size:13px;}
.row button{white-space:nowrap;padding:8px 12px;background:#4A1628;color:#E8C97A;border:none;border-radius:7px;font-size:13px;cursor:pointer;}
.alerta{background:#FFF8E7;border:1px solid #C9A84C;border-radius:8px;padding:10px 12px;font-size:13px;color:#6B4A00;margin-bottom:12px;}
.vazio{text-align:center;padding:36px 16px;color:#7A6E6E;font-style:italic;font-size:14px;}
.vazio span{display:block;font-size:36px;margin-bottom:8px;}
.filtros{display:flex;gap:8px;margin-bottom:12px;}
.filtros select{flex:1;font-size:13px;}
.reg-data{font-size:10px;color:#7A6E6E;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.reg-ev{font-family:'Playfair Display',serif;font-size:15px;color:#4A1628;font-weight:700;margin-bottom:4px;}
.reg-tema{font-size:13px;color:#1A0A0F;margin-bottom:6px;font-style:italic;}
.reg-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
 
/* LITÚRGICO */
.ciclo-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.ciclo-btn{flex:1;min-width:70px;padding:8px 6px;border-radius:20px;border:2px solid #C9A84C;background:white;color:#4A1628;font-family:'Crimson Pro',serif;font-size:13px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;}
.ciclo-btn.on{background:#4A1628;color:#E8C97A;}
.prog-box{background:white;border-radius:10px;padding:14px 16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(74,22,40,0.08);border-top:3px solid #C9A84C;}
.barra{background:#EAE2D0;border-radius:20px;height:12px;margin:8px 0 4px;overflow:hidden;}
.barra-fill{height:100%;border-radius:20px;background:linear-gradient(to right,#2D6A4F,#52B788);transition:width 0.5s;}
.tempo-box{background:white;border-radius:10px;margin-bottom:10px;box-shadow:0 1px 6px rgba(74,22,40,0.07);overflow:hidden;}
.tempo-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;border-left:4px solid #C9A84C;-webkit-tap-highlight-color:transparent;}
.tempo-nome{font-family:'Playfair Display',serif;font-size:15px;color:#4A1628;font-weight:700;}
.tempo-prog{font-size:11px;color:#7A6E6E;text-align:right;}
.tempo-dias{padding:0 14px 12px;display:none;}
.tempo-dias.ab{display:block;}
.dia-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F0EAE0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.dia-item:last-child{border-bottom:none;}
.dia-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid #CCC;background:white;}
.dia-dot.g1{background:#2D6A4F;border-color:#2D6A4F;}
.dia-dot.g2{background:#1A5276;border-color:#1A5276;}
.dia-info{flex:1;min-width:0;}
.dia-nome{font-size:13px;color:#1A0A0F;font-weight:500;}
.dia-ev{font-size:11px;color:#7A6E6E;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dia-cnt{font-size:11px;color:#7A6E6E;white-space:nowrap;}
.dia-cnt.ok{color:#2D6A4F;font-weight:600;}
.dia-cnt.multi{color:#1A5276;font-weight:600;}
.legenda{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#7A6E6E;}
.leg-dot{width:10px;height:10px;border-radius:50%;}
 
/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:100;align-items:flex-end;justify-content:center;}
.modal.ab{display:flex;}
.modal-box{background:#F5F0E8;border-radius:18px 18px 0 0;padding:20px 18px 34px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-titulo{font-family:'Playfair Display',serif;font-size:18px;color:#4A1628;margin-bottom:4px;}
.modal-sub{font-size:13px;color:#7A6E6E;margin-bottom:14px;font-style:italic;}
.modal-close{float:right;background:none;border:none;font-size:22px;color:#7A6E6E;cursor:pointer;margin-top:-4px;}
.modal-grav{background:white;border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid #2D6A4F;}
</style>
</head>

<div class="content">
 
<!-- NOVA GRAVAÇÃO -->
<div id="p-nova" class="panel ativo">
  <div class="card">
    <div class="titulo">Nova Gravação</div>
    <label>Data</label>
    <input type="date" id="f-data">
    <label>Posição Litúrgica</label>
    <select id="f-ciclo" onchange="atualizarDias()">
      <option value="">— Ciclo (opcional) —</option>
    </select>
    <select id="f-dia" style="margin-top:6px;" onchange="verificarDia()">
      <option value="">— Dia litúrgico —</option>
    </select>
    <div id="f-aviso" style="display:none;margin-top:8px;"></div>
    <label>Evangelho</label>
    <input type="text" id="f-ev" placeholder="Ex: Jo 3,16-21">
    <label>Título / Tema</label>
    <input type="text" id="f-titulo" spellcheck="true" lang="pt-BR" placeholder="Ex: A misericórdia do Pai">
    <label>Mensagem (opcional)</label>
    <textarea id="f-msg" spellcheck="true" lang="pt-BR" placeholder="Pontos principais..."></textarea>
    <label>Temas abordados</label>
    <div class="tags" id="f-tags"></div>
    <div class="row" style="margin-top:8px;">
      <input type="text" id="f-novatag" spellcheck="true" lang="pt-BR" placeholder="Novo tema..." onkeydown="if(event.key==='Enter')addTema()">
      <button onclick="addTema()">+ Add</button>
    </div>
    <label>Canais</label>
    <div class="tags">
      <span class="tag on" id="c-radio" onclick="toggleCanal(this,'radio')">📻 Rádio</span>
      <span class="tag on" id="c-whats" onclick="toggleCanal(this,'whatsapp')">💬 WhatsApp</span>
      <span class="tag on" id="c-spot" onclick="toggleCanal(this,'spotify')">🎵 Spotify</span>
      <span class="tag" id="c-yt" onclick="toggleCanal(this,'youtube')">▶️ YouTube</span>
      <span class="tag" id="c-outro" onclick="toggleCanal(this,'outro')">➕ Outro</span>
    </div>
    <label>Observações (opcional)</label>
    <input type="text" id="f-obs" spellcheck="true" lang="pt-BR" placeholder="Ex: Boa audiência...">
    <button class="btn" onclick="salvar()">✝ Registrar Gravação</button>
  </div>
</div>
 
<!-- HISTÓRICO -->
<div id="p-historico" class="panel">
  <div class="busca-wrap">
    <span class="busca-ico">🔍</span>
    <input type="text" id="h-busca" placeholder="Buscar..." oninput="renderH()">
  </div>
  <div class="filtros">
    <select id="h-canal" onchange="renderH()">
      <option value="">Todos os canais</option>
      <option value="radio">📻 Rádio</option>
      <option value="whatsapp">💬 WhatsApp</option>
      <option value="spotify">🎵 Spotify</option>
      <option value="youtube">▶️ YouTube</option>
    </select>
    <select id="h-tema" onchange="renderH()">
      <option value="">Todos os temas</option>
    </select>
  </div>
  <div id="h-lista"></div>
</div>
 
<!-- LITÚRGICO -->
<div id="p-liturgico" class="panel">
  <div class="ciclo-tabs" id="ciclo-tabs"></div>
  <div class="legenda">
    <div class="leg-item"><div class="leg-dot" style="background:white;border:2px solid #CCC;width:10px;height:10px;border-radius:50%;"></div>Não gravado</div>
    <div class="leg-item"><div class="leg-dot" style="background:#2D6A4F;"></div>Gravado 1×</div>
    <div class="leg-item"><div class="leg-dot" style="background:#1A5276;"></div>Gravado 2×+</div>
  </div>
  <div id="l-prog"></div>
  <div id="l-lista"></div>
</div>
 
<!-- TEMAS -->
<div id="p-temas" class="panel">
  <div class="card">
    <div class="titulo">Gerenciar Temas</div>
    <div class="row">
      <input type="text" id="t-novo" spellcheck="true" lang="pt-BR" placeholder="Nome do novo tema...">
      <button onclick="criarTema()">+ Criar</button>
    </div>
  </div>
  <div class="titulo" style="margin-top:4px;">Temas cadastrados</div>
  <div id="t-lista"></div>
  <div class="card" style="margin-top:14px;">
    <div class="titulo">Verificar Evangelho</div>
    <label>Evangelho</label>
    <input type="text" id="t-evbusca" placeholder="Ex: Jo 3,16" oninput="verificarEv()">
    <div id="t-evres" style="margin-top:8px;"></div>
  </div>
</div>
 
<!-- RESUMO -->
<div id="p-resumo" class="panel">
  <div id="r-stats"></div>
  <div class="titulo">Temas mais usados</div>

  <div class="titulo" style="margin-top:14px;">Últimas gravações</div>
  <div id="r-ultimas"></div>
  <button class="btn btn-sec" onclick="exportar()">📥 Exportar dados (JSON)</button>
  <button class="btn btn-sec" style="margin-top:8px;color:#8B1A1A;border-color:#8B1A1A;" onclick="limpar()">🗑️ Apagar todos os dados</button>
</div>
 
</div>
 
<!-- MODAL -->
<div class="modal" id="modal" onclick="fecharModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="fecharModalBtn()">×</button>
    <div class="modal-titulo" id="m-titulo"></div>
    <div class="modal-sub" id="m-sub"></div>
    <div id="m-corpo"></div>
    <button class="btn" style="margin-top:12px;" onclick="irParaDia()">+ Registrar para este dia</button>
  </div>
</div>
 
<script>
// ===== DADOS =====
var D = JSON.parse(localStorage.getItem('ac_ev') || '{"gravacoes":[],"temas":["Misericórdia","Fé","Oração","Perdão","Amor ao próximo","Conversão","Esperança","Família","Evangelização","Gratidão"]}');
var canais = ["radio","whatsapp","spotify"];
var tags = [];
var cicloAtivo = "Ciclo A";
var modalDiaId = null;
var modalCiclo = null;
 
function sv() { localStorage.setItem('ac_ev', JSON.stringify(D)); }
function fmtData(d) { var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function hoje() { return new Date().toISOString().split('T')[0]; }
 
// ===== NAVEGAÇÃO =====
function ir(aba) {
  var abas = ["nova","historico","liturgico","temas","resumo"];
  for(var i=0;i<abas.length;i++){
    var p = document.getElementById('p-'+abas[i]);
    var t = document.getElementById('tab-'+abas[i]);
    if(p) p.style.display = abas[i]===aba ? 'block' : 'none';
    if(t) {
      if(abas[i]===aba){ t.classList.add('ativo'); }
      else { t.classList.remove('ativo'); }
    }
  }
  if(aba==='historico') renderH();
  if(aba==='temas') renderT();
  if(aba==='resumo') renderR();
  if(aba==='liturgico'){ renderCicloTabs(); renderLit(); }
}
 
// ===== INIT =====
window.addEventListener('load', function(){
  document.getElementById('f-data').value = hoje();
  renderTags();
  popularCicloSelect();
  ir('nova');
});
 
// ===== FORMULÁRIO =====
function popularCicloSelect(){
  var s = document.getElementById('f-ciclo');
  s.innerHTML = '<option value="">— Ciclo (opcional) —</option>';
  Object.keys(CAL).forEach(function(c){
    var o = document.createElement('option'); o.value=c; o.textContent=c; s.appendChild(o);
  });
}
 
function atualizarDias(){
  var ciclo = document.getElementById('f-ciclo').value;
  var s = document.getElementById('f-dia');
  s.innerHTML = '<option value="">— Dia litúrgico —</option>';
  if(!ciclo) return;
  Object.entries(CAL[ciclo]).forEach(function(entry){
    var tempo=entry[0], dias=entry[1];
    var g = document.createElement('optgroup'); g.label=tempo;
    dias.forEach(function(d){
      var o=document.createElement('option'); o.value=d.id;
      o.textContent=d.nome+' ('+d.ev+')'; g.appendChild(o);
    });
    s.appendChild(g);
  });
}
 
function verificarDia(){
  var diaId = document.getElementById('f-dia').value;
  var av = document.getElementById('f-aviso');
  if(!diaId){ av.style.display='none'; return; }
  var gs = D.gravacoes.filter(function(g){ return g.diaId===diaId; });
  if(gs.length){
    av.style.display='block';
    av.innerHTML='<div class="alerta" style="background:#FFF0F0;border-color:#8B1A1A;color:#8B1A1A;">⚠️ Já gravado '+gs.length+' vez(es):<br>'+gs.map(function(g){ return '<strong>'+fmtData(g.data)+'</strong> — '+g.titulo; }).join('<br>')+'</div>';
  } else { av.style.display='none'; }
}
 
function renderTags(){
  var c = document.getElementById('f-tags'); c.innerHTML='';
  D.temas.forEach(function(t){
    var el=document.createElement('span'); el.className='tag'+(tags.includes(t)?' on':'');
    el.textContent=t; el.onclick=function(){ toggleTag(t,el); }; c.appendChild(el);
  });
}
 
function toggleTag(t,el){
  if(tags.includes(t)){ tags=tags.filter(function(x){return x!==t;}); el.classList.remove('on'); }
  else { tags.push(t); el.classList.add('on'); }
}
 
function toggleCanal(el,c){
  if(canais.includes(c)){ canais=canais.filter(function(x){return x!==c;}); el.classList.remove('on'); }
  else { canais.push(c); el.classList.add('on'); }
}
 
function addTema(){
  var inp=document.getElementById('f-novatag'); var n=inp.value.trim();
  if(!n) return;
  if(!D.temas.includes(n)){ D.temas.push(n); sv(); }
  if(!tags.includes(n)) tags.push(n);
  inp.value=''; renderTags();
}
 
function salvar(){
  var data=document.getElementById('f-data').value;
  var ev=document.getElementById('f-ev').value.trim();
  var titulo=document.getElementById('f-titulo').value.trim();
  var msg=document.getElementById('f-msg').value.trim();
  var obs=document.getElementById('f-obs').value.trim();
  var diaId=document.getElementById('f-dia').value;
  var cicloId=document.getElementById('f-ciclo').value;
  if(!ev){ alert('Informe o Evangelho.'); return; }
  if(!titulo){ alert('Informe o título/tema.'); return; }
  D.gravacoes.unshift({id:Date.now(),data:data,ev:ev,titulo:titulo,msg:msg,obs:obs,temas:[].concat(tags),canais:[].concat(canais),diaId:diaId,ciclo:cicloId});
  sv();
  document.getElementById('f-ev').value='';
  document.getElementById('f-titulo').value='';
  document.getElementById('f-msg').value='';
  document.getElementById('f-obs').value='';
  document.getElementById('f-ciclo').value='';
  document.getElementById('f-dia').innerHTML='<option value="">— Dia litúrgico —</option>';
  document.getElementById('f-aviso').style.display='none';
  document.getElementById('f-data').value=hoje();
  tags=[];
  canais=["radio","whatsapp","spotify"];
  document.getElementById('c-radio').classList.add('on');

// ===== HISTÓRICO =====
function canalNome(c){ return c==='radio'?'📻 Rádio':c==='whatsapp'?'💬 WhatsApp':c==='spotify'?'🎵 Spotify':c==='youtube'?'▶️ YouTube':'➕ Outro'; }
function canalCor(c){ return c==='radio'?'#1A5276':c==='whatsapp'?'#2D6A4F':c==='spotify'?'#1DB954':c==='youtube'?'#C0392B':'#888'; }
 
function renderH(){
  var busca=(document.getElementById('h-busca')||{}).value||''; busca=busca.toLowerCase();
  var fc=(document.getElementById('h-canal')||{}).value||'';
  var ft=(document.getElementById('h-tema')||{}).value||'';
  var sel=document.getElementById('h-tema');
  if(sel){ var av=sel.value; sel.innerHTML='<option value="">Todos os temas</option>'; D.temas.forEach(function(t){ var o=document.createElement('option'); o.value=t; o.textContent=t; if(t===av) o.selected=true; sel.appendChild(o); }); }
  var lista=D.gravacoes.filter(function(g){
    var txt=(g.ev+' '+g.titulo+' '+(g.msg||'')+' '+(g.temas||[]).join(' ')).toLowerCase();
    return (!busca||txt.includes(busca))&&(!fc||(g.canais||[]).includes(fc))&&(!ft||(g.temas||[]).includes(ft));
  });
  var c=document.getElementById('h-lista');
  if(!lista.length){ c.innerHTML='<div class="vazio"><span>📖</span>Nenhuma gravação encontrada.</div>'; return; }
  c.innerHTML=lista.map(function(g){
    return '<div class="card-mini"><button class="btn-del" onclick="del('+g.id+')">×</button><div class="reg-data">'+fmtData(g.data)+(g.ciclo?' · '+g.ciclo:'')+'</div><div class="reg-ev">📖 '+g.ev+'</div><div class="reg-tema">'+g.titulo+'</div>'+(g.temas&&g.temas.length?'<div class="reg-tags">'+g.temas.map(function(t){ return '<span class="tag-mini">'+t+'</span>'; }).join('')+'</div>':'')+'<div>'+(g.canais||[]).map(function(c){ return '<span class="badge" style="background:'+canalCor(c)+'">'+canalNome(c)+'</span>'; }).join('')+'</div>'+(g.obs?'<div style="font-size:11px;color:#7A6E6E;margin-top:4px;font-style:italic;">💬 '+g.obs+'</div>':'')+'</div>';
  }).join('');
}
 
function del(id){
  if(!confirm('Excluir?')) return;
  D.gravacoes=D.gravacoes.filter(function(g){ return g.id!==id; });
  sv(); renderH(); renderR();
}
 
// ===== TEMAS =====
function renderT(){
  var usos={};
  D.gravacoes.forEach(function(g){ (g.temas||[]).forEach(function(t){ usos[t]=(usos[t]||0)+1; }); });
  var c=document.getElementById('t-lista');
  c.innerHTML=D.temas.map(function(t){
    return '<div class="ev-item"><span>'+t+'</span><span class="ev-st">'+( usos[t]||0)+' uso(s) <button onclick="delTema(''+t+'')" style="background:none;border:none;color:#CCC;cursor:pointer;font-size:16px;">×</button></span></div>';
  }).join('');
}
 
function criarTema(){
  var n=document.getElementById('t-novo').value.trim(); if(!n) return;
  if(!D.temas.includes(n)){ D.temas.push(n); sv(); }
  document.getElementById('t-novo').value=''; renderT(); renderTags();
}
 
function delTema(t){
  if(!confirm('Excluir "'+t+'"?')) return;
  D.temas=D.temas.filter(function(x){ return x!==t; }); sv(); renderT(); renderTags();
}
 
function verificarEv(){
  var b=document.getElementById('t-evbusca').value.trim().toLowerCase();
  var c=document.getElementById('t-evres');
  if(!b){ c.innerHTML=''; return; }
  var gs=D.gravacoes.filter(function(g){ return g.ev.toLowerCase().includes(b); });
  c.innerHTML=gs.length?'<div class="alerta" style="background:#FFF0F0;border-color:#8B1A1A;color:#8B1A1A;">⚠️ Gravado '+gs.length+' vez(es):<br>'+gs.map(function(g){ return '<strong>'+fmtData(g.data)+'</strong> — '+g.titulo; }).join('<br>')+'</div>':'<div class="alerta">✅ Ainda não gravado — pode usar!</div>';
}
 
// ===== RESUMO =====
function renderR(){
  var total=D.gravacoes.length;
  var radio=D.gravacoes.filter(function(g){ return (g.canais||[]).includes('radio'); }).length;
  var evU=new Set(D.gravacoes.map(function(g){ return g.ev.toLowerCase(); })).size;
  var litU=D.gravacoes.filter(function(g){ return g.diaId; }).length;
  document.getElementById('r-stats').innerHTML='<div class="stats"><div class="stat"><div class="stat-n">'+total+'</div><div class="stat-l">Gravações</div></div><div class="stat"><div class="stat-n">'+evU+'</div><div class="stat-l">Evangelhos únicos</div></div><div class="stat"><div class="stat-n">'+radio+'</div><div class="stat-l">Na Rádio</div></div><div class="stat"><div class="stat-n">'+litU+'</div><div class="stat-l">No Litúrgico</div></div></div>';
  var usos={};
  D.gravacoes.forEach(function(g){ (g.temas||[]).forEach(function(t){ usos[t]=(usos[t]||0)+1; }); });
  var rank=Object.entries(usos).sort(function(a,b){ return b[1]-a[1]; }).slice(0,8);
  document.getElementById('r-ranking').innerHTML=rank.length?rank.map(function(r){ return '<div class="ev-item"><span>'+r[0]+'</span><span class="ev-st" style="color:#4A1628;font-weight:600;">'+r[1]+'×</span></div>'; }).join(''):'<div class="vazio"><span>🏷️</span>Nenhum tema ainda.</div>';
  document.getElementById('r-ultimas').innerHTML=D.gravacoes.slice(0,3).map(function(g){ return '<div class="card-mini"><div class="reg-data">'+fmtData(g.data)+'</div><div class="reg-ev">📖 '+g.ev+'</div><div class="reg-tema">'+g.titulo+'</div></div>'; }).join('') || '<div class="vazio"><span>📖</span>Nenhuma gravação.</div>';
}
 
function exportar(){
  var b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='amigo-catolico.json'; a.click();
}
 
function limpar(){
  if(!confirm('⚠️ Apagar TUDO?')) return;
  D={gravacoes:[],temas:["Misericórdia","Fé","Oração","Perdão","Amor ao próximo","Conversão","Esperança","Família","Evangelização","Gratidão"]};
  sv(); renderH(); renderT(); renderR(); alert('Dados apagados.');
}
 
// ===== LITÚRGICO =====
function getDiasGrav(){
  var m={};
  D.gravacoes.forEach(function(g){ if(g.diaId){ if(!m[g.diaId]) m[g.diaId]=[]; m[g.diaId].push(g); } });
  return m;
}
 
function renderCicloTabs(){
  var c=document.getElementById('ciclo-tabs');
  c.innerHTML=Object.keys(CAL).map(function(k){
    return '<button class="ciclo-btn'+(k===cicloAtivo?' on':'')+'" onclick="setCiclo(''+k+'')">'+k+'</button>';
  }).join('');
}
 
function setCiclo(c){ cicloAtivo=c; renderCicloTabs(); renderLit(); }
 
function renderLit(){
  var tempos=CAL[cicloAtivo]; var grav=getDiasGrav();
  var total=0,gravados=0;
  Object.values(tempos).forEach(function(dias){ total+=dias.length; dias.forEach(function(d){ if(grav[d.id]&&grav[d.id].length) gravados++; }); });
  var pct=total?Math.round(gravados/total*100):0;
  document.getElementById('l-prog').innerHTML='<div class="prog-box"><div style="display:flex;justify-content:space-between;"><span style="font-family:Playfair Display,serif;font-size:15px;color:#4A1628;font-weight:700;">'+cicloAtivo+'</span><span style="font-size:13px;color:#2D6A4F;font-weight:600;">'+gravados+'/'+total+' dias</span></div><div class="barra"><div class="barra-fill" style="width:'+pct+'%"></div></div><div style="display:flex;justify-content:space-between;font-size:12px;color:#7A6E6E;"><span>'+pct+'% concluído</span><span>'+(total-gravados)+' faltando</span></div></div>';
  var cores={"Advento":"#6B3FA0","Natal":"#C9A84C","Quaresma":"#6B3FA0","Tríduo Pascal":"#8B1A1A","Tempo Pascal":"#C9A84C","Tempo Comum":"#2D6A4F","Festas do Senhor":"#C9A84C"};
  document.getElementById('l-lista').innerHTML=Object.entries(tempos).map(function(entry){
    var tempo=entry[0],dias=entry[1];
    var gt=dias.filter(function(d){ return grav[d.id]&&grav[d.id].length; }).length;
    var cor=cores[tempo.split(' (')[0]]||'#C9A84C';
    return '<div class="tempo-box"><div class="tempo-hdr" style="border-left-color:'+cor+';" onclick="toggleT(this)"><div><div class="tempo-nome">'+tempo+'</div><div style="font-size:11px;color:#7A6E6E;">'+dias.length+' dias</div></div><div class="tempo-prog"><strong style="font-size:14px;color:#2D6A4F;">'+gt+'</strong>/'+dias.length+'<br><span style="font-size:10px;">'+Math.round(gt/dias.length*100)+'%</span></div></div><div class="tempo-dias">'+dias.map(function(d){
      var gs=grav[d.id]||[];
      var dc=gs.length>1?'g2':gs.length===1?'g1':'';
      var cc=gs.length>1?'multi':gs.length===1?'ok':'';
      var ct=gs.length===0?'não gravado':gs.length===1?'✓ 1 gravação':'✓ '+gs.length+' gravações';
      return '<div class="dia-item" onclick="abrirDia(''+d.id+'',''+cicloAtivo+'')"><div class="dia-dot '+dc+'"></div><div class="dia-info"><div class="dia-nome">'+d.nome+'</div><div class="dia-ev">'+d.ev+'</div></div><div class="dia-cnt '+cc+'">'+ct+'</div></div>';
    }).join('')+'</div></div>';
  }).join('');
}
 
function toggleT(hdr){ hdr.nextElementSibling.classList.toggle('ab'); }
 
function abrirDia(id,ciclo){
  modalDiaId=id; modalCiclo=ciclo;
  var tempos=CAL[ciclo]; var dia=null;
  Object.values(tempos).forEach(function(dias){ dias.forEach(function(d){ if(d.id===id) dia=d; }); });
  if(!dia) return;
  document.getElementById('m-titulo').textContent=dia.nome;
  document.getElementById('m-sub').textContent='Evangelho: '+dia.ev+' · '+ciclo;
  var gs=(getDiasGrav()[id]||[]);
  document.getElementById('m-corpo').innerHTML=gs.length?gs.map(function(g){ return '<div class="modal-grav"><div style="font-size:11px;color:#7A6E6E;">'+fmtData(g.data)+'</div><div style="font-family:Playfair Display,serif;font-size:14px;color:#4A1628;margin:3px 0;">'+g.titulo+'</div>'+(g.msg?'<div style="font-size:12px;margin-top:4px;">'+g.msg.substring(0,120)+'</div>':'')+'</div>'; }).join(''):'<div class="vazio" style="padding:16px;"><span>🎙️</span>Ainda não gravado!</div>';
  document.getElementById('modal').classList.add('ab');
}
 
function fecharModal(e){ if(e.target===document.getElementById('modal')) fecharModalBtn(); }
function fecharModalBtn(){ document.getElementById('modal').classList.remove('ab'); }
function irParaDia(){

}
